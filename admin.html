<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fish Point Admin</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; color: #222; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .card { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 3px 14px rgba(0,0,0,0.08); margin-bottom: 18px; }
    h1, h2 { margin: 0 0 14px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    input, textarea, select, button { width: 100%; box-sizing: border-box; padding: 12px; border-radius: 10px; border: 1px solid #d7d7d7; }
    textarea { min-height: 100px; resize: vertical; }
    button { cursor: pointer; background: #2E4554; color: #fff; border: none; }
    button.secondary { background: #8a8a8a; }
    button.danger { background: #b63a3a; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px; border-bottom: 1px solid #ececec; vertical-align: top; }
    .stats { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
    .stat { background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 3px 14px rgba(0,0,0,0.08); }
    .stat .v { font-size: 28px; font-weight: 700; margin-top: 8px; }
    .img-mini { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; background: #eee; }
    .row-actions { display: flex; gap: 8px; }
    .row-actions button { width: auto; padding: 10px 14px; }
    .muted { color: #666; font-size: 12px; }
    @media (max-width: 900px) {
      .grid, .grid-4, .stats { grid-template-columns: 1fr; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      td { border: none; padding: 8px 0; }
      tr { border-bottom: 1px solid #ececec; padding: 10px 0; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Админка Рыбная Точка</h1>
    <div class="grid">
      <div>
        <label>Backend URL</label>
        <input id="backend-url" placeholder="http://127.0.0.1:8000">
      </div>
      <div style="display:flex; align-items:flex-end; gap:12px;">
        <button onclick="saveBackendUrl()">Сохранить backend</button>
      </div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="card">
    <h2 id="form-title">Добавить товар</h2>
    <input type="hidden" id="product-id">
    <div class="grid-4">
      <input id="cat" placeholder="Категория">
      <input id="name" placeholder="Название">
      <input id="price" type="number" step="0.01" placeholder="Цена">
      <input id="pack" placeholder="Упаковка">
    </div>
    <div class="grid">
      <textarea id="desc" placeholder="Описание"></textarea>
      <textarea id="kbju" placeholder="КБЖУ"></textarea>
    </div>
    <div class="grid-4">
      <input id="sort_order" type="number" placeholder="Порядок">
      <select id="is_active">
        <option value="true">Активен</option>
        <option value="false">Скрыт</option>
      </select>
      <input id="image" placeholder="Путь к картинке или загрузите файл ниже">
      <input id="image-file" type="file" accept=".jpg,.jpeg,.png,.webp,.gif">
    </div>
    <div class="grid">
      <button onclick="uploadAndSave()">Сохранить товар</button>
      <button class="secondary" onclick="resetForm()">Очистить форму</button>
    </div>
    <div class="muted" style="margin-top:8px;">Фото можно загрузить прямо здесь. После загрузки путь подставится автоматически.</div>
  </div>

  <div class="card">
    <h2>Товары</h2>
    <table>
      <thead>
        <tr><th>ID</th><th>Фото</th><th>Категория</th><th>Название</th><th>Цена</th><th>Порядок</th><th>Статус</th><th>Действия</th></tr>
      </thead>
      <tbody id="products-body"></tbody>
    </table>
  </div>

  <div class="card">
    <h2>Заказы</h2>
    <table>
      <thead>
        <tr><th>Номер</th><th>Дата</th><th>Клиент</th><th>Телефон</th><th>Самовывоз</th><th>Сумма</th><th>Состав</th></tr>
      </thead>
      <tbody id="orders-body"></tbody>
    </table>
  </div>
</div>

<script>
let BACKEND_URL = new URLSearchParams(location.search).get('backend') || localStorage.getItem('fish_admin_backend') || 'http://127.0.0.1:8000';
document.getElementById('backend-url').value = BACKEND_URL;

function saveBackendUrl() {
  BACKEND_URL = document.getElementById('backend-url').value.trim().replace(/\/$/, '');
  localStorage.setItem('fish_admin_backend', BACKEND_URL);
  loadAll();
}

function resolveImg(path) {
  const v = String(path || '').trim();
  if (!v) return '';
  if (v.startsWith('http://') || v.startsWith('https://') || v.startsWith('data:')) return v;
  if (v.startsWith('/uploads/') || v.startsWith('/static/')) return BACKEND_URL + v;
  return BACKEND_URL + '/static/' + v.replace(/^\/+/, '');
}

async function api(path, options = {}) {
  const response = await fetch(BACKEND_URL + path, options);
  const raw = await response.text();
  let parsed;
  try { parsed = raw ? JSON.parse(raw) : null; } catch { parsed = raw; }
  if (!response.ok) throw new Error(parsed?.detail || parsed?.message || parsed || 'Ошибка запроса');
  return parsed;
}

async function loadStats() {
  const stats = await api('/api/admin/stats');
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div>Уникальные посетители</div><div class="v">${stats.unique_visitors}</div></div>
    <div class="stat"><div>Всего заходов</div><div class="v">${stats.total_visits}</div></div>
    <div class="stat"><div>С корзиной</div><div class="v">${stats.cart_users}</div></div>
    <div class="stat"><div>Заказы</div><div class="v">${stats.orders_count}</div></div>
    <div class="stat"><div>Покупатели</div><div class="v">${stats.order_users}</div></div>
    <div class="stat"><div>Выручка</div><div class="v">${stats.total_revenue}</div></div>`;
}

async function loadProducts() {
  const products = await api('/api/admin/products');
  document.getElementById('products-body').innerHTML = products.map(p => `
    <tr>
      <td>${p.id}</td>
      <td>${p.image ? `<img class="img-mini" src="${resolveImg(p.image)}">` : ''}</td>
      <td>${p.cat || ''}</td>
      <td>${p.name || ''}</td>
      <td>${p.price || ''}</td>
      <td>${p.sort_order || ''}</td>
      <td>${p.is_active ? 'Активен' : 'Скрыт'}</td>
      <td>
        <div class="row-actions">
          <button onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&#39;")})'>Редактировать</button>
          <button class="danger" onclick='deleteProduct(${p.id})'>Удалить</button>
        </div>
      </td>
    </tr>`).join('');
}

async function loadOrders() {
  const orders = await api('/api/admin/orders');
  document.getElementById('orders-body').innerHTML = orders.map(o => `
    <tr>
      <td>${o.order_id || ''}</td>
      <td>${o.created_at || ''}</td>
      <td>${(o.user?.first_name || '') + ' ' + (o.user?.last_name || '')}</td>
      <td>${o.phone || ''}</td>
      <td>${o.pickup_time || ''}</td>
      <td>${o.total_after_bonus || o.total || 0}</td>
      <td>${(o.items || []).map(i => `${i.name} x ${i.qty}`).join('<br>')}</td>
    </tr>`).join('');
}

function getFormPayload() {
  return {
    cat: document.getElementById('cat').value.trim(),
    name: document.getElementById('name').value.trim(),
    price: Number(document.getElementById('price').value || 0),
    pack: document.getElementById('pack').value.trim(),
    desc: document.getElementById('desc').value.trim(),
    kbju: document.getElementById('kbju').value.trim(),
    image: document.getElementById('image').value.trim(),
    is_active: document.getElementById('is_active').value === 'true',
    sort_order: document.getElementById('sort_order').value ? Number(document.getElementById('sort_order').value) : null
  };
}

function validateForm(payload) {
  if (!payload.cat) throw new Error('Категория обязательна');
  if (!payload.name) throw new Error('Название обязательно');
  if (!payload.price) throw new Error('Цена обязательна');
}

async function uploadImageIfNeeded() {
  const fileInput = document.getElementById('image-file');
  const file = fileInput.files[0];
  if (!file) return null;
  const form = new FormData();
  form.append('file', file);
  const result = await api('/api/admin/upload-image', { method: 'POST', body: form });
  document.getElementById('image').value = result.image;
  fileInput.value = '';
  return result.image;
}

async function uploadAndSave() {
  try {
    const uploaded = await uploadImageIfNeeded();
    const payload = getFormPayload();
    if (uploaded) payload.image = uploaded;
    validateForm(payload);
    const id = document.getElementById('product-id').value;
    if (id) {
      await api(`/api/admin/products/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    } else {
      await api('/api/admin/products', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    }
    resetForm();
    await loadProducts();
    await loadStats();
    alert('Сохранено');
  } catch (e) {
    alert(e.message);
  }
}

function editProduct(p) {
  document.getElementById('form-title').innerText = 'Редактировать товар';
  document.getElementById('product-id').value = p.id || '';
  document.getElementById('cat').value = p.cat || '';
  document.getElementById('name').value = p.name || '';
  document.getElementById('price').value = p.price || '';
  document.getElementById('pack').value = p.pack || '';
  document.getElementById('desc').value = p.desc || '';
  document.getElementById('kbju').value = p.kbju || '';
  document.getElementById('image').value = p.image || '';
  document.getElementById('sort_order').value = p.sort_order || '';
  document.getElementById('is_active').value = String(!!p.is_active);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function resetForm() {
  document.getElementById('form-title').innerText = 'Добавить товар';
  document.getElementById('product-id').value = '';
  document.getElementById('cat').value = '';
  document.getElementById('name').value = '';
  document.getElementById('price').value = '';
  document.getElementById('pack').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('kbju').value = '';
  document.getElementById('image').value = '';
  document.getElementById('sort_order').value = '';
  document.getElementById('is_active').value = 'true';
  document.getElementById('image-file').value = '';
}

async function deleteProduct(id) {
  if (!confirm('Удалить товар?')) return;
  try {
    await api(`/api/admin/products/${id}`, { method: 'DELETE' });
    await loadProducts();
    await loadStats();
  } catch (e) {
    alert(e.message);
  }
}

async function loadAll() {
  try {
    await Promise.all([loadStats(), loadProducts(), loadOrders()]);
  } catch (e) {
    alert(e.message);
  }
}

loadAll();
</script>
</body>
</html>
